# =============================================================================
# Unity バージョン:ハッシュ リスト更新ワークフロー
# -----------------------------------------------------------------------------
# テンプレートリポジトリ側で毎日実行され、Unity 公式 Editor Release API から
# 全リリースの「バージョン / changeset / stream」を取得して
# .github/unity-versions.tsv を再生成する。差分がある時だけコミットする。
#
# ※ このファイルはテンプレートから生成されたリポジトリでは
#    template-init.yml によって自動削除される。
# =============================================================================
name: Update Unity Versions List

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST
  workflow_dispatch:        # 手動更新用

jobs:
  update:
    # リスト維持はテンプレートリポジトリの仕事。生成先リポジトリでは動かさない
    if: github.event.repository.is_template == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all Unity releases
        run: |
          LIMIT=25
          OFFSET=0
          TOTAL=1
          : > /tmp/releases.jsonl
          while [ "$OFFSET" -lt "$TOTAL" ]; do
            RESP=$(curl -sf "https://services.api.unity.com/unity/editor/release/v1/releases?limit=$LIMIT&offset=$OFFSET")
            TOTAL=$(echo "$RESP" | jq -r '.total')
            echo "$RESP" | jq -c '.results[]' >> /tmp/releases.jsonl
            OFFSET=$((OFFSET + LIMIT))
            sleep 0.3
          done
          mkdir -p .github
          # 形式: <version>\t<shortRevision>\t<stream>  (releaseDate 降順)
          jq -rs 'unique_by(.version)
                  | sort_by(.releaseDate) | reverse
                  | .[] | "\(.version)\t\(.shortRevision)\t\(.stream)"' \
            /tmp/releases.jsonl > .github/unity-versions.tsv

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/unity-versions.tsv
          git diff --cached --quiet && exit 0
          git commit -m "chore: update unity versions list"
          git push
