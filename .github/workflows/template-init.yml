# =============================================================================
# テンプレート初期化ワークフロー
# -----------------------------------------------------------------------------
# テンプレートから新規リポジトリを生成した際の最初の push で 1 回だけ実行され、
#   1. cc-sdd のセットアップ (claude-agent / codex-skills, 日本語) ※リポジトリ直下
#   2. 同梱の設定済みプロジェクト (TemplateProject) をリポジトリ名にリネームし、
#      ProjectSettings の productName もリポジトリ名へ書き換え
#   3. 標準バージョン (env: UNITY_VERSION) が同梱プロジェクトのバージョンと
#      異なる場合のみ、ProjectVersion.txt を書き換え、manifest.json の
#      公式パッケージを適合版へその場更新 (サードパーティは温存)
#   4. 初期化系ワークフローの削除・README の差し替え
# を行い、結果を "chore: initialize from template" としてコミットする。
#
# デバッグ: workflow_dispatch で手動実行した場合は自己削除をスキップする。
# =============================================================================
name: Template Init

on:
  push:
    branches: [main]
  workflow_dispatch:   # デバッグ用 (自己削除しない)

env:
  # ─────────────────────────────────────────────
  # 標準 Unity バージョン (ステークホルダー標準の安定版)
  # 同梱 TemplateProject のバージョンと同じなら初期化時は何も変換されず、
  # 手動キュレーション済みの manifest.json がそのまま使われる。
  # ここを書き換えると初期化時にバージョン切替 + パッケージ適合更新が走る。
  # ─────────────────────────────────────────────
  UNITY_VERSION: 6000.0.36f1
  # 同梱プロジェクトのディレクトリ名 (テンプレート側で固定)
  TEMPLATE_DIR: TemplateProject
  # 初期プロジェクトのディレクトリ名 (既定はリポジトリ名)
  PROJECT_DIR: ${{ github.event.repository.name }}

jobs:
  init:
    # テンプレートリポジトリ自身では push で発火させない (手動実行のみ許可)
    if: github.event.repository.is_template == false || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── ① cc-sdd セットアップ (リポジトリ直下) ─────────────
      - name: Setup cc-sdd
        run: |
          npx -y --registry https://registry.npmjs.org/ cc-sdd@latest --claude-agent --lang ja
          npx -y --registry https://registry.npmjs.org/ cc-sdd@latest --codex-skills --lang ja

      # ── ② 同梱プロジェクトをリポジトリ名にリネーム ─────────
      #    ディレクトリ名 (git mv) + ProjectSettings の productName
      #    再実行 (デバッグ) 時はリネーム済みでも冪等に動く
      - name: Rename template project
        run: |
          if [ -d "$TEMPLATE_DIR" ]; then
            bash .github/scripts/rename-project.sh "$TEMPLATE_DIR" "$PROJECT_DIR"
          elif [ -d "$PROJECT_DIR" ]; then
            bash .github/scripts/rename-project.sh "$PROJECT_DIR" "$PROJECT_DIR"
          else
            echo "::error::'$TEMPLATE_DIR' も '$PROJECT_DIR' も見つかりません。テンプレートの同梱プロジェクトを確認してください"
            exit 1
          fi

      # ── ③ 標準バージョンへの切り替え (差分がある時だけ) ─────
      #    ProjectVersion.txt + manifest.json 公式パッケージの適合更新
      - name: Apply Unity version
        run: |
          CURRENT=$(awk '/^m_EditorVersion:/{print $2; exit}' "$PROJECT_DIR/ProjectSettings/ProjectVersion.txt")
          if [ "$CURRENT" = "$UNITY_VERSION" ]; then
            echo "Unity $CURRENT (同梱バージョンのまま) : $PROJECT_DIR" >> "$GITHUB_STEP_SUMMARY"
          else
            bash .github/scripts/set-unity-version.sh "$PROJECT_DIR" "$UNITY_VERSION"
          fi

      # ── ④ コミット & 初期化系ワークフローの自己削除 ────────
      #    ※ set-unity-version.yml / set-project-name.yml /
      #      add-unity-project.yml / scripts は残す
      - name: Commit and cleanup
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            rm -f .github/workflows/template-init.yml
            rm -f .github/workflows/unity-versions-update.yml
            # テンプレート専用 README を生成先用に差し替え
            mv -f .github/PROJECT_README.md README.md
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore: initialize from template"
          git push
