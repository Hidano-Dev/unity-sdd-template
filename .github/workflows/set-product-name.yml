# =============================================================================
# プロダクト名変更ワークフロー
# -----------------------------------------------------------------------------
# 生成されたリポジトリに常駐する。Actions タブから手動実行し、
# 指定プロジェクトの ProjectSettings.asset の productName を
# 入力テキストへ書き換える。ディレクトリ名は変更しない
# (変更したい場合はローカルで git mv すること)。
# 存在しないプロジェクトはエラーで停止する。
# =============================================================================
name: Set Product Name

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'プロジェクトディレクトリ名 (リポジトリ直下)'
        required: true
        type: string
      product_name:
        description: '新しいプロダクト名 (ProjectSettings の productName)'
        required: true
        type: string

jobs:
  set-product-name:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 自由入力テキストはシェルへ直接展開せず env 経由で渡す
    env:
      PROJECT: ${{ inputs.project }}
      PRODUCT_NAME: ${{ inputs.product_name }}
    steps:
      - uses: actions/checkout@v4

      # 既存プロジェクトのみ対象 (タイポによる誤操作を防ぐ)
      - name: Validate project directory
        run: |
          if [ ! -f "$PROJECT/ProjectSettings/ProjectSettings.asset" ]; then
            echo "::error::'$PROJECT' は Unity プロジェクトとして見つかりません。ディレクトリ名を確認してください"
            exit 1
          fi

      - name: Set product name
        run: bash .github/scripts/set-product-name.sh "$PROJECT" "$PRODUCT_NAME"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PROJECT"
          git diff --cached --quiet && exit 0
          git commit -m "chore($PROJECT): set product name to $PRODUCT_NAME"
          git push
